name: Publish to PyPI

# Publishes `haid` to PyPI via Trusted Publishing (OIDC) — no API tokens.
# Triggers when you push a version tag like `v0.0.1`, or manually from the Actions tab.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    name: Build distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"
      - name: Check version consistency
        # The version is declared in 4 files (pyproject, __init__, plugin.json,
        # marketplace.json). Fail the release if they disagree, or — on a tag push —
        # if any of them doesn't equal the tag (e.g. v0.0.5 -> 0.0.5).
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            python scripts/check_versions.py --expect "${GITHUB_REF_NAME#v}"
          else
            python scripts/check_versions.py
          fi
      - name: Build sdist and wheel
        run: |
          python -m pip install --upgrade build
          python -m build
      - name: No session data in the built package
        # Release-time copy of ci.yml's leak guard — a tag push doesn't trigger ci.yml, so
        # this is the authoritative last line before upload (the viz-sample incident class).
        run: |
          set -euo pipefail
          rm -rf _scan && mkdir _scan
          for f in dist/*.tar.gz; do tar xzf "$f" -C _scan; done
          for f in dist/*.whl; do (cd _scan && unzip -oq "../$f"); done
          hits=$(grep -rlaE '"parentUuid"|"sessionId"|"toolUseResult"|"isSidechain"' _scan 2>/dev/null | grep -vE '\.py$' || true)
          if [ -n "$hits" ]; then
            echo "::error::transcript-like content found in the built package:"; echo "$hits"; exit 1
          fi
          rm -rf _scan
          echo "clean: no transcript markers in the built package"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    needs: build
    runs-on: ubuntu-latest
    # The environment name must match the "pending publisher" you register on PyPI.
    environment:
      name: pypi
      url: https://pypi.org/p/haid
    permissions:
      id-token: write  # required for Trusted Publishing (OIDC)
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/
      - name: Publish
        uses: pypa/gh-action-pypi-publish@release/v1
